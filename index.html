<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jumeirah Design & Product Standards — Revised Programme</title>
<style>
  :root{
    --paper:#f5f1ea; --ink:#2c2a26; --muted:#908a80;
    --gold:#8b6914; --line:#e6ddcf; --card:#ffffff;
    --c-44:#c05a3a; --c-jg:#4e88a6; --c-await:#c2912a; --c-mile:#d4a017; --c-pause:#b3ada1;
    --rev:color-mix(in srgb,var(--c-jg) 26%,#fff);
    --rev2:color-mix(in srgb,var(--c-jg) 14%,#fff);
    --serif:"Bressay","Bressay Display",Georgia,"Times New Roman",serif;
    --sans:"Avenir Next","Avenir","Nunito Sans","Helvetica Neue",Arial,sans-serif;
    --label-w:218px; --note-w:300px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:radial-gradient(1200px 600px at 12% -10%, #fbf8f2 0%, transparent 60%), var(--paper);
    color:var(--ink);font-family:var(--sans);padding:34px 26px 52px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1380px;margin:0 auto}

  .mast{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;margin-bottom:4px}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--c-44);margin:0 0 8px;font-weight:600}
  h1{font-family:var(--serif);font-weight:700;color:var(--gold);font-size:38px;line-height:1.04;margin:0}
  .sub{font-family:var(--serif);font-size:21px;margin:6px 0 0;font-weight:500}
  .meta{font-size:11px;color:var(--muted);text-align:right;line-height:1.8;text-transform:uppercase;letter-spacing:.08em}
  .meta b{color:var(--ink);font-weight:700}
  .rule{height:2px;background:linear-gradient(to right,var(--gold),transparent 70%);margin:16px 0 14px;border-radius:2px}

  .tabs{display:flex;gap:8px;margin:0 0 14px}
  .tab{font-family:var(--sans);font-size:13px;font-weight:700;padding:9px 18px;border-radius:999px;border:1px solid var(--line);background:#fff;color:#6c665c;cursor:pointer;transition:.15s}
  .tab:hover{border-color:#d7cbb6}
  .tab.active{background:var(--c-44);color:#fff;border-color:var(--c-44)}

  .key{display:flex;flex-wrap:wrap;gap:6px 22px;font-size:12px;color:#6c665c;margin:0 0 16px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 16px}
  .key .it{display:inline-flex;gap:7px;align-items:baseline}
  .key b{color:var(--c-44);font-weight:700}

  .panel{display:none}
  .panel.active{display:block;animation:fade .35s ease both}

  .scope{font-size:13px;color:#6c665c;margin:0 0 16px;max-width:1040px;line-height:1.5}
  .scope b{color:var(--ink);font-weight:700}

  .legend{display:flex;flex-wrap:wrap;gap:12px 20px;align-items:center;margin:0 0 20px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 18px}
  .lg{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#5b554c}
  .sw{width:26px;height:13px;border-radius:4px;flex:none}
  .sw.s44{background:var(--c-44)}
  .sw.srev{background:repeating-linear-gradient(45deg,var(--rev),var(--rev) 6px,var(--rev2) 6px,var(--rev2) 12px)}
  .sw.sawait{background:color-mix(in srgb,var(--c-await) 12%,#fff);border:1.5px dashed var(--c-await)}
  .sw.swork{background:color-mix(in srgb,var(--c-mile) 30%,#fff);border:1px solid color-mix(in srgb,var(--c-mile) 50%,#fff)}
  .dia{width:12px;height:12px;background:var(--c-mile);transform:rotate(45deg);flex:none;box-shadow:0 0 0 3px rgba(212,160,23,.18)}

  .chart{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 10px 30px -18px rgba(76,60,40,.28)}
  .grid{width:100%}

  /* shared 3-column frame: label | notes | timeline */
  .head,.ribbon,.ghead,.row{display:grid;grid-template-columns:var(--label-w) var(--note-w) 1fr}

  .head{background:#f3ede3;border-bottom:1px solid var(--line)}
  .head .corner,.head .corner2{padding:12px 16px}
  .head .corner2{border-left:1px solid var(--line)}
  .head .k{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .cal{border-left:1px solid var(--line)}
  .months,.weeks{display:grid;grid-template-columns:repeat(10,1fr)}
  .months > div{font-family:var(--serif);font-size:17px;color:var(--gold);font-weight:600;padding:9px 0 2px 9px;border-left:1px solid var(--line)}
  .weeks > div{font-size:10px;color:#6c665c;padding:2px 0 9px 9px;border-left:1px solid var(--line);font-weight:600}
  .weeks > div.now{color:var(--c-44)}
  .weeks > div .wn{display:block;font-size:8px;color:var(--muted);letter-spacing:.05em;font-weight:500}

  .ribbon{background:#fbf7f0;border-bottom:1px solid var(--line)}
  .ribbon .rl{padding:9px 16px;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;font-weight:600}
  .ribbon .rl2{border-left:1px solid var(--line)}
  .ribbon .rt{display:grid;grid-template-columns:repeat(10,1fr);padding:8px 0;border-left:1px solid var(--line)}
  .seg{height:22px;border-radius:6px;margin:0 4px;display:flex;align-items:center;justify-content:center;font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;font-weight:700;white-space:nowrap;overflow:hidden}
  .seg.issue{grid-column:1/2;background:color-mix(in srgb,var(--c-44) 16%,#fff);color:var(--c-44)}
  .seg.pause{grid-column:2/6;background:repeating-linear-gradient(45deg,#c4beb2,#c4beb2 9px,#bcb5a9 9px,#bcb5a9 18px);color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.28)}
  .seg.work{grid-column:6/11;background:color-mix(in srgb,var(--c-mile) 22%,#fff);color:#7a5a12}

  .ghead{border-top:2px solid var(--line);background:#fbf7f0}
  .ghead .gl{padding:10px 16px;display:flex;flex-direction:column;gap:1px}
  .ghead .gn{font-size:11px;letter-spacing:.13em;text-transform:uppercase;font-weight:700;color:var(--c-44)}
  .ghead.c .gn{color:#7a5a12}
  .ghead .gd{font-size:11.5px;color:var(--muted);font-style:italic}

  .row{border-top:1px solid var(--line)}
  .lab{padding:9px 12px 9px 16px;display:flex;flex-direction:column;gap:3px;justify-content:center;background:#fffdf9}
  .lab .id{font-size:9.5px;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;font-weight:600}
  .lab .nm{font-size:13px;font-weight:700;line-height:1.15}
  .tags{display:flex;gap:4px;margin-top:2px;flex-wrap:wrap}
  .tag{font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:999px;border:1px solid var(--line);color:#6c665c;background:#faf6ef;font-weight:600}
  .tag.own{color:#fff;border:0}
  .tag.o44{background:var(--c-44)} .tag.ojg{background:var(--c-jg)}

  /* notes column */
  .note{padding:8px 14px;display:flex;flex-direction:column;gap:3px;justify-content:center;border-left:1px solid var(--line);background:#fff}
  .note .ln{font-size:11px;color:#4a443b;font-weight:500;line-height:1.28}
  .note .who{font-weight:700;margin-right:5px}
  .w44{color:var(--c-44)} .wjg{color:var(--c-jg)}
  .note.mile .ml{font-size:11px;color:#7a5a12;font-weight:600;line-height:1.25}

  /* timeline */
  .track{position:relative;display:grid;grid-template-columns:repeat(10,1fr);align-items:center;min-height:50px;border-left:1px solid var(--line);
    background-image:
      linear-gradient(to right, rgba(192,90,58,.05) 0, rgba(192,90,58,.05) 10%, rgba(179,173,161,.10) 10%, rgba(179,173,161,.10) 50%, transparent 50%),
      repeating-linear-gradient(to right, transparent 0, transparent calc(100%/10 - 1px), var(--line) calc(100%/10 - 1px), var(--line) calc(100%/10));
  }
  .flow{height:24px;margin:0 4px}
  .flow .segs{display:flex;height:100%;border-radius:7px;overflow:hidden;box-shadow:0 1px 2px rgba(76,60,40,.12)}
  .flow .segs .d{flex:1;background:var(--c-44)}
  .flow .segs .r{flex:4;border-left:2px solid #fff;background:repeating-linear-gradient(45deg,var(--rev),var(--rev) 7px,var(--rev2) 7px,var(--rev2) 14px)}
  .awaitbar{height:24px;border-radius:7px;margin:0 4px;background:color-mix(in srgb,var(--c-await) 12%,#fff);border:1.5px dashed var(--c-await)}
  .bar{height:24px;border-radius:7px;margin:0 4px}
  .bar.solid{background:var(--c-44);box-shadow:0 1px 2px rgba(76,60,40,.14)}
  .bar.jg{background:var(--c-jg);box-shadow:0 1px 2px rgba(76,60,40,.14)}
  .mdot{display:flex;align-items:center;justify-content:center;height:100%}
  .mdot .d{width:13px;height:13px;background:var(--c-mile);transform:rotate(45deg);box-shadow:0 0 0 3px rgba(212,160,23,.16)}

  .notes{margin:20px 2px 0;display:grid;grid-template-columns:1fr 1fr;gap:9px 30px}
  .notes h3{grid-column:1/-1;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--c-44);margin:0 0 2px;font-weight:700}
  .notes p{margin:0;font-size:12.5px;color:#5b554c;line-height:1.45}
  .notes p b{color:var(--ink)}
  @media(max-width:760px){.notes{grid-template-columns:1fr}}

  /* checklist */
  .cl-intro{font-size:13.5px;color:#6c665c;margin:0 0 18px;max-width:1000px;line-height:1.5}
  .checklist{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:820px){.checklist{grid-template-columns:1fr}}
  .col{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 10px 30px -20px rgba(76,60,40,.25)}
  .col .ch{padding:14px 20px;border-bottom:1px solid var(--line)}
  .col .ch .h{font-family:var(--serif);font-size:20px;font-weight:700;margin:0}
  .col .ch .s{font-size:12px;color:var(--muted);margin-top:3px}
  .col.await .ch{background:color-mix(in srgb,var(--c-jg) 8%,#fff)} .col.await .h{color:#3a6b85}
  .col.from .ch{background:color-mix(in srgb,var(--c-44) 8%,#fff)} .col.from .h{color:var(--c-44)}
  .std{padding:13px 20px;border-top:1px solid #f1eadd}
  .std:first-of-type{border-top:0}
  .std .sh{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .std .chip{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:999px;background:#efe7d8;color:#6c665c}
  .std .nm{font-size:12px;color:var(--muted);font-weight:600}
  .chk{display:flex;gap:10px;align-items:flex-start;padding:4px 0;cursor:pointer;font-size:12.5px;color:#4a443b;line-height:1.3}
  .chk .box{width:15px;height:15px;border:1.5px solid #cabfaf;border-radius:4px;flex:none;position:relative;margin-top:1px;transition:.12s}
  .chk:hover .box{border-color:var(--c-44)}
  .chk.done .box{background:var(--c-44);border-color:var(--c-44)}
  .chk.done .box::after{content:"";position:absolute;left:4px;top:1px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .chk.done .t{color:var(--muted)}
  .std .note2{font-size:11.5px;color:var(--muted);font-style:italic;margin:6px 0 0;padding-left:25px}

  .foot{margin-top:22px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:center;font-weight:600}
  .row,.ghead,.head,.ribbon{animation:fade .5s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  #gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:60;padding:24px;
    background:radial-gradient(1000px 600px at 50% -10%, #fbf8f2 0%, transparent 60%), var(--paper)}
  .gatecard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:40px 42px 36px;max-width:430px;width:100%;
    text-align:center;box-shadow:0 24px 60px -28px rgba(76,60,40,.4)}
  .gatecard .lk{width:46px;height:46px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;
    background:color-mix(in srgb,var(--c-44) 12%,#fff);border:1.5px solid color-mix(in srgb,var(--c-44) 35%,#fff)}
  .gatecard .lk svg{width:20px;height:20px;stroke:var(--c-44);fill:none;stroke-width:2}
  .gatecard .ey{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--c-44);font-weight:700;margin:0 0 8px}
  .gatecard h2{font-family:var(--serif);color:var(--gold);font-size:25px;font-weight:700;line-height:1.1;margin:0 0 8px}
  .gatecard .pp{font-size:13px;color:var(--muted);margin:0 0 22px;line-height:1.5}
  .gatecard input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-family:var(--sans);
    font-size:14px;color:var(--ink);background:#fffdf9;outline:none;transition:.15s;text-align:center;letter-spacing:.04em}
  .gatecard input:focus{border-color:var(--c-44)}
  .gatecard button{width:100%;margin-top:12px;padding:12px 14px;border:0;border-radius:10px;background:var(--c-44);color:#fff;
    font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:.02em;cursor:pointer;transition:.15s}
  .gatecard button:hover{background:#a94c2f}
  .gatecard .err{min-height:18px;margin-top:12px;font-size:12.5px;color:#c0392b;font-weight:600}
  #content{display:none}

</style>
</head>

    const enc=new TextEncoder(), dec=new TextDecoder();
    function b64b(s){const b=atob(s);const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
    async function tryOpen(){
      const pw=document.getElementById('pw').value;
      const err=document.getElementById('err'); err.textContent='';
      if(!window.crypto||!window.crypto.subtle){err.textContent='This browser cannot open the protected file. Please try Chrome, Edge or Safari.';return;}
      try{
        const salt=b64b(SALT), iv=b64b(IV), data=b64b(CT);
        const base=await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
        const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:ITER,hash:'SHA-256'}, base, {name:'AES-GCM',length:256}, false, ['decrypt']);
        const buf=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv}, key, data);
        document.getElementById('content').innerHTML=dec.decode(buf);
        document.getElementById('content').style.display='block';
        document.getElementById('gate').remove();
        initContent();
      }catch(e){ err.textContent='Incorrect password. Please try again.'; }
    }
    function initContent(){
      document.querySelectorAll('#content .tab').forEach(function(btn){
        btn.addEventListener('click',function(){
          document.querySelectorAll('#content .tab').forEach(function(b){b.classList.remove('active');});
          document.querySelectorAll('#content .panel').forEach(function(p){p.classList.remove('active');});
          btn.classList.add('active');
          document.getElementById(btn.dataset.panel).classList.add('active');
        });
      });
      document.querySelectorAll('#content .chk').forEach(function(c){
        c.addEventListener('click',function(e){e.preventDefault();c.classList.toggle('done');});
      });
    }
    document.getElementById('openBtn').addEventListener('click', tryOpen);
    document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') tryOpen(); });
